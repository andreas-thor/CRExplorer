
# creates entire db schema for CRE
create_schema: 
  - DROP TABLE IF EXISTS CR
  - CREATE TABLE CR ( 
      CR_ID 	int, 
      CR_CR 	varchar , 
      CR_RPY 	int, 
      CR_N_CR int, 
      CR_AU 	varchar, 
      CR_AU_L varchar, 
      CR_AU_F varchar, 
      CR_AU_A varchar, 
      CR_TI 	varchar, 
      CR_J 	varchar, 
      CR_J_N 	varchar, 
      CR_J_S 	varchar, 
      CR_VOL 	varchar, 
      CR_PAG 	varchar, 
      CR_DOI 	varchar, 
      CR_ClusterId1 int, 
      CR_ClusterId2 int,  
      CR_ClusterSize int,  
      CR_VI boolean, 
      CR_SORT_ORDER int, 
      CR_Format varchar, 
      CR_PERC_YR double precision, 
      CR_PERC_ALL double precision, 
      CR_CP_IN double precision,
      CR_CP_EX double precision,
      CR_N_PYEARS int,	
      CR_PYEAR_PERC double precision,
      CR_N_PCT_P50 int,
      CR_N_PCT_P75 int,
      CR_N_PCT_P90 int,
      CR_N_PCT_P99 int,
      CR_N_PCT_P999 int,
      CR_N_PCT_AboveAverage_P50 int,
      CR_N_PCT_AboveAverage_P75 int,
      CR_N_PCT_AboveAverage_P90 int,
      CR_N_PCT_AboveAverage_P99 int,
      CR_N_PCT_AboveAverage_P999 int,
      CR_SEQUENCE varchar,
      CR_TYPE varchar,
      CR_BLOCKINGKEY varchar,
      CR_MERGED_INTO int, 
      PRIMARY KEY (CR_ID)  
    )
  
  # we use a temp table for efficient import
  - DROP TABLE IF EXISTS CR_Temp
  - CREATE TABLE CR_Temp ( 
      CR_ID 	int, 
      CR_CR 	varchar , 
      CR_RPY 	int, 
      CR_AU 	varchar, 
      CR_AU_L varchar, 
      CR_AU_F varchar, 
      CR_AU_A varchar, 
      CR_TI 	varchar, 
      CR_J 	varchar, 
      CR_J_N 	varchar, 
      CR_J_S 	varchar, 
      CR_VOL 	varchar, 
      CR_PAG 	varchar, 
      CR_DOI 	varchar, 
      CR_ClusterId1 int, 
      CR_ClusterId2 int,  
      CR_ClusterSize int, 
      CR_VI boolean,	
      CR_Format varchar,
      PUB_ID int, 
      PUB_PY int, 
      PRIMARY KEY (CR_ID)  
    )

  - DROP TABLE IF EXISTS PUB
  - CREATE TABLE PUB ( 
      PUB_ID int, 
      PUB_PT varchar, 
      PUB_AU varchar,  
      PUB_AF varchar,
      PUB_C1 varchar,
      PUB_EM varchar,
      PUB_AA varchar,
      PUB_TI varchar,
      PUB_PY int, 
      PUB_SO varchar,
      PUB_VL varchar,
      PUB_IS varchar,
      PUB_AR varchar,
      PUB_BP int, 
      PUB_EP int, 
      PUB_PG int, 
      PUB_TC int, 
      PUB_DI varchar,
      PUB_LI varchar,
      PUB_AB varchar,
      PUB_DE varchar,
      PUB_DT varchar,
      PUB_FS varchar,
      PUB_UT varchar,
      PRIMARY KEY (PUB_ID)  
    )
  
  - DROP TABLE IF EXISTS PUB_CR
  - CREATE TABLE PUB_CR ( 
      PUB_ID	int, 
      CR_ID 	int, 
      CR_RPY int,
      PUB_PY int, 
      PRIMARY KEY (PUB_ID, CR_ID)  
    )
  
  - DROP TABLE IF EXISTS PUB_CR2
  - CREATE TABLE PUB_CR2 ( 
      PUB_ID	int, 
      CR_ID 	int
    )

  - DROP TABLE IF EXISTS CR_MATCH
  - CREATE TABLE CR_MATCH ( 
      CR_ID1 	int, 
      CR_ID2 	int, 
      sim double precision, 
      PRIMARY KEY (CR_ID1, CR_ID2)  
    )

  - DROP TABLE IF EXISTS CR_MATCH_AUTO
  - CREATE TABLE CR_MATCH_AUTO ( 
      CR_ID1 	int, 
      CR_ID2 	int, 
      sim double precision, 
      PRIMARY KEY (CR_ID1, CR_ID2)  
    )
  
  - DROP TABLE IF EXISTS CR_MATCH_MANU
  - CREATE TABLE CR_MATCH_MANU ( 
      CR_ID1 	int, 
      CR_ID2 	int, 
      sim 	double precision, 
      tstamp 	bigint, 
      PRIMARY KEY (CR_ID1, CR_ID2)  
    )

  - DROP TABLE IF EXISTS CR_Cluster
  - CREATE TABLE CR_Cluster (
        CR_ID INT,
        CR_ClusterId1 INT, 
        CR_ClusterId2 INT,
        CR_VOL 	varchar, 
        CR_PAG 	varchar, 
        CR_DOI 	varchar,     
        PRIMARY KEY (CR_ID)  
    )

# delete all tuples in all tables
delete_all:
  - postgres: TRUNCATE TABLE CR
  - postgres: TRUNCATE TABLE CR_Temp
  - postgres: TRUNCATE TABLE PUB
  - postgres: TRUNCATE TABLE PUB_CR
  - postgres: TRUNCATE TABLE PUB_CR2
  - postgres: TRUNCATE TABLE CR_MATCH
  - postgres: TRUNCATE TABLE CR_MATCH_AUTO
  - postgres: TRUNCATE TABLE CR_MATCH_MANU
  - postgres: TRUNCATE TABLE CR_Cluster
  - sqlite: DELETE FROM CR
  - sqlite: DELETE FROM CR_Temp
  - sqlite: DELETE FROM PUB
  - sqlite: DELETE FROM PUB_CR
  - sqlite: DELETE FROM PUB_CR2
  - sqlite: DELETE FROM CR_MATCH
  - sqlite: DELETE FROM CR_MATCH_AUTO
  - sqlite: DELETE FROM CR_MATCH_MANU
  - sqlite: DELETE FROM CR_Cluster




