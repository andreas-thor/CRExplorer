after_import: 
  - INSERT INTO PUB_CR (CR_ID, CR_RPY, PUB_ID, PUB_PY)
    SELECT DISTINCT 
      first_value (CR_ID) over (partition by CR_CR order by CR_ID), 
      first_value (CR_RPY) over (partition by CR_CR order by CR_ID), 
      PUB_ID, 
      PUB_PY
    FROM CR_Temp

  - INSERT INTO CR 
    (       CR_ID, CR_CR, CR_RPY, CR_N_CR, CR_AU, CR_AU_L, CR_AU_F, CR_AU_A, CR_TI, CR_J, CR_J_N, CR_J_S, CR_VOL, CR_PAG, CR_DOI, 
            CR_ClusterId1, CR_ClusterId2, CR_ClusterSize, CR_VI, CR_Format)
    SELECT CR_Temp.CR_ID, CR_CR, CR_RPY, T.PUBCOUNT, CR_AU, CR_AU_L, CR_AU_F, CR_AU_A, CR_TI, CR_J, CR_J_N, CR_J_S, CR_VOL, CR_PAG, CR_DOI, 
          CR_ClusterId1, CR_ClusterId2, CR_ClusterSize, CR_VI, CR_Format
    FROM CR_Temp
    JOIN (
      SELECT CR_ID, COUNT(*) AS PUBCOUNT
      FROM PUB_CR
      GROUP BY CR_ID
    ) AS T
    ON (CR_Temp.CR_ID = T.CR_ID)


before_import:
  - sqlite: DELETE FROM CR_Temp
  - sqlite: DELETE FROM CR
  - sqlite: DELETE FROM PUB_CR
  - sqlite: DELETE FROM PUB
  - postgres: TRUNCATE TABLE CR_Temp
  - postgres: TRUNCATE TABLE CR
  - postgres: TRUNCATE TABLE PUB_CR
  - postgres: TRUNCATE TABLE PUB  